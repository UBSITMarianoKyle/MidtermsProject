<!-- src/app/components/suppliers-list/suppliers-list.html -->
<h2>Suppliers List</h2>

<table class="table table-striped">
  <thead>
    <tr>
      <th>ID</th>
      <th>Supplier Name</th>
      <th>Contact Person</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let supplier of suppliers">
      <td>{{ supplier.id }}</td>
      <td>{{ supplier.supplierName }}</td>
      <td>{{ supplier.contactPerson }}</td>
      <td>
        <button class="btn btn-primary" (click)="viewSupplier(supplier)">
          View
        </button>
      </td>
    </tr>
  </tbody>
</table>


<app-supplier-details
  *ngIf="selectedSupplier"
  [supplier]="selectedSupplier"
  (closeDetails)="selectedSupplier = null">
</app-supplier-details>
