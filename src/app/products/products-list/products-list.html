<div class="mb-3 products-container">
  <h1 class="text-success mb-4">Products List</h1>

  <!-- Products Table -->
  <table class="table table-hover table-striped shadow-sm">
    <thead class="table-success">
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Status</th>
        <th>Price</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let product of products">
        <td>{{ product.id }}</td>
        <td>{{ product.name }}</td>
        <td>
          <span [ngClass]="{
            'badge bg-success': product.status === 'Available',
            'badge bg-danger': product.status === 'Out of Stock',
            'badge bg-warning text-dark': product.status === 'Limited'
          }">
            {{ product.status }}
          </span>
        </td>
        <td>₱{{ product.price | number:'1.2-2' }}</td>
        <td>
          <button class="btn btn-primary" (click)="openProductDetails(product)">
            View / Edit
          </button>
        </td>
      </tr>
    </tbody>
  </table>

  <!-- Product Details Below Table -->
  <app-product-details
    *ngIf="selectedProduct"
    [product]="selectedProduct"
  ></app-product-details>
</div>
